<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚽ Poisson Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #080a0f;
      --surface: #0f1219;
      --card:    #13171f;
      --border:  #1c2130;
      --border2: #252d40;
      --green:   #0dff8c;
      --red:     #ff4757;
      --yellow:  #ffd32a;
      --blue:    #4a9eff;
      --text:    #dde2ed;
      --muted:   #4a526b;
      --muted2:  #6b7590;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, #0f141e 0%, transparent 100%);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .logo h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.12em;
      color: var(--green);
      text-shadow: 0 0 30px #0dff8c50;
    }

    .logo span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .header-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted2);
      letter-spacing: 0.1em;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .refresh-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── LOADING ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── SUMMARY BAR ── */
    #summary {
      display: none;
      gap: 1rem;
      margin-bottom: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      text-align: center;
    }

    .stat-pill .sp-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      color: var(--green);
    }

    .stat-pill .sp-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* ── LEAGUE SECTION ── */
    .league-section { margin-bottom: 2.5rem; }

    .league-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .league-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: var(--muted2);
    }

    .league-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
    }

    /* ── MATCH CARD ── */
    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .match-card:hover { border-color: var(--border2); }
    .match-card.has-value { border-color: #0dff8c30; }

    .match-top {
      padding: 1rem 1.2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      user-select: none;
    }

    .team {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .team.home { text-align: left; }
    .team.away { text-align: right; }

    .team-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.2;
    }

    .team-xg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted2);
    }

    .match-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      min-width: 70px;
    }

    .match-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--green);
      background: #0dff8c10;
      border: 1px solid #0dff8c20;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
    }

    .vs {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── PROB BAR ── */
    .prob-bar-row {
      display: flex;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      margin: 0 1.2rem;
    }

    .prob-seg-h { background: var(--blue); }
    .prob-seg-d { background: var(--muted); }
    .prob-seg-a { background: var(--red); }

    .prob-labels {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 1.2rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted2);
    }

< truncated lines 297-312 >
    }

    .detail-block h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    /* Score table */
    .score-list { display: flex; flex-direction: column; gap: 0.35rem; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .score-row .sr-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      width: 14px;
      text-align: right;
    }

    .score-row .sr-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      width: 32px;
      color: var(--text);
    }

    .score-row:first-child .sr-score { color: var(--green); }

    .sr-bar-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sr-bar {
      height: 5px;
      background: var(--green);
      border-radius: 3px;
      opacity: 0.6;
    }

    .score-row:first-child .sr-bar { opacity: 1; }

    .sr-prob {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted2);
      white-space: nowrap;
    }

    /* Value bets */
    .value-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .value-chip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0dff8c08;
      border: 1px solid #0dff8c25;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
    }

    .vc-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
    }

    .vc-right {
      display: flex;
      gap: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
    }

    .vc-cote { color: var(--yellow); }
    .vc-ev { color: var(--green); }

    .no-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.5rem 0;
    }

    /* Value badge */
    .value-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      background: var(--green);
      color: #000;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Empty state */
    #empty {
      display: none;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }

    #empty .big { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1>⚽ POISSON SCOUT</h1>
    <span>v2.0 — Score Exact Engine</span>
  </div>
  <div style="display:flex;align-items:center;gap:1rem">
    <div class="header-date" id="hdate">—</div>
    <button class="refresh-btn" onclick="loadMatches()">⟳ Refresh</button>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Chargement des matchs du jour...</div>
  </div>

  <div id="summary" style="display:none; margin-bottom:2rem; display:none">
  </div>

  <div id="matches-container"></div>

  <div id="empty">
    <div class="big">🌙</div>
    Aucun match programmé aujourd'hui dans les ligues suivies.
  </div>
</main>

<script>
  // Format date
  const today = new Date();
  document.getElementById('hdate').textContent = today.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  function toggleDetail(el) {
    const detail = el.nextElementSibling?.nextElementSibling?.nextElementSibling;
    if (!detail) return;
    detail.classList.toggle('open');
  }

  function buildMatchCard(m) {
    const hasValue = m.value_bets && m.value_bets.length > 0;
    const maxProb = m.top_scores[0]?.prob || 1;

    const scoresHTML = m.top_scores.slice(0,8).map((s, i) => {
      const w = Math.round((s.prob / maxProb) * 100);
      return `<div class="score-row">
        <span class="sr-rank">${i+1}</span>
        <span class="sr-score">${s.score}</span>
        <div class="sr-bar-wrap">
          <div class="sr-bar" style="width:${w}%"></div>
          <span class="sr-prob">${s.prob}%</span>
        </div>
      </div>`;
    }).join('');

    const valueHTML = hasValue
      ? m.value_bets.map(v => `
          <div class="value-chip">
            <span class="vc-label">${v.label}</span>
            <div class="vc-right">
              <span>~${v.prob}%</span>
              <span class="vc-cote">@${v.cote}</span>
              <span class="vc-ev">EV +${v.ev}</span>
            </div>
          </div>`).join('')
      : `<div class="no-value">Aucune value détectée (1X2)</div>`;

    return `
      <div class="match-card ${hasValue ? 'has-value' : ''}">
        <div class="match-top" onclick="this.parentElement.querySelector('.match-detail').classList.toggle('open')">
          <div class="team home">
            <div class="team-name">${m.home} ${hasValue ? '<span class="value-badge">VALUE</span>' : ''}</div>
            <div class="team-xg">xG ${m.xg_h}</div>
          </div>
          <div class="match-center">
            <div class="match-time">${m.time} UTC</div>
            <div class="vs">VS</div>
          </div>
          <div class="team away">
            <div class="team-name">${m.away}</div>
            <div class="team-xg">xG ${m.xg_a}</div>
          </div>
        </div>

        <div class="prob-bar-row">
          <div class="prob-seg-h" style="flex:${m.prob_home}"></div>
          <div class="prob-seg-d" style="flex:${m.prob_draw}"></div>
          <div class="prob-seg-a" style="flex:${m.prob_away}"></div>
        </div>
        <div class="prob-labels">
          <span>${m.home.split(' ')[0]} ${m.prob_home}%</span>
          <span>Nul ${m.prob_draw}%</span>
          <span>${m.prob_away}% ${m.away.split(' ')[0]}</span>
        </div>

        <div class="match-detail">
          <div class="detail-block">
            <h3>🎯 Top Scores Probables</h3>
            <div class="score-list">${scoresHTML}</div>
          </div>
          <div class="detail-block">
            <h3>💰 Value Bets Détectés</h3>
            <div class="value-list">${valueHTML}</div>
          </div>
        </div>
      </div>`;
  }

  async function loadMatches() {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('matches-container').innerHTML = '';
    document.getElementById('empty').style.display = 'none';

    try {
      const res = await fetch('/api/matches');
      const data = await res.json();
      const matches = data.matches || [];

      document.getElementById('loading').style.display = 'none';

      if (!matches.length) {
        document.getElementById('empty').style.display = 'block';
        return;
      }

      // Group by league
      const byLeague = {};
      matches.forEach(m => {
        if (!byLeague[m.league]) byLeague[m.league] = { flag: m.flag, matches: [] };
        byLeague[m.league].matches.push(m);
      });

      // Summary
      const totalValue = matches.filter(m => m.value_bets?.length > 0).length;
      const summaryEl = document.getElementById('summary');
      summaryEl.innerHTML = `
        <div class="stat-pill"><div class="sp-val">${matches.length}</div><div class="sp-label">Matchs aujourd'hui</div></div>
        <div class="stat-pill"><div class="sp-val" style="color:var(--yellow)">${totalValue}</div><div class="sp-label">Value Bets détectés</div></div>
        <div class="stat-pill"><div class="sp-val">${Object.keys(byLeague).length}</div><div class="sp-label">Ligues</div></div>
      `;
      summaryEl.style.display = 'grid';

      // Render
      const container = document.getElementById('matches-container');
      Object.entries(byLeague).forEach(([league, info]) => {
        const section = document.createElement('div');
        section.className = 'league-section';
        section.innerHTML = `
          <div class="league-header">
            <span style="font-size:1.2rem">${info.flag}</span>
            <h2>${league}</h2>
            <span class="league-count">${info.matches.length} match${info.matches.length > 1 ? 's' : ''}</span>
          </div>
          ${info.matches.map(m => buildMatchCard(m)).join('')}
        `;
        container.appendChild(section);
      });

    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('matches-container').innerHTML = `
        <div style="text-align:center;padding:4rem;color:var(--red);font-family:'JetBrains Mono',monospace;font-size:0.8rem">
          ⚠️ Erreur de chargement. Vérifie tes clés API et relance.
        </div>`;
    }
  }

  loadMatches();
</script>
</body>
  </html>
